name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black

      - name: Run flake8
        run: flake8 src tests --max-line-length=120 --exclude=__pycache__

      - name: Check formatting with black
        run: black --check -l 120 src tests

  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: python src/download_data.py

      - name: Train model (needed so API tests have an artifact to load)
        run: python src/train.py

      - name: Run unit tests with coverage
        run: pytest tests/ -v --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Upload MLflow tracking DB
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking
          path: |
            mlflow.db
            mlruns/

  build-docker:
    name: Build Docker Image
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t heart-disease-api:${{ github.sha }} -f Dockerfile .

      - name: Smoke-test the container
        run: |
          docker run -d --name test-container -p 8000:8000 heart-disease-api:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container

  deploy:
    name: Deploy (manual/staging trigger)
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder deployment step
        run: |
          echo "Add your kubectl apply / cloud deploy commands here, e.g.:"
          echo "kubectl apply -f k8s/configmap.yaml"
          echo "kubectl apply -f k8s/deployment.yaml"
          echo "kubectl apply -f k8s/service.yaml"
